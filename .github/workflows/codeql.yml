name: codeql

# Security scanning of the C dashboard (panel_dash) with CodeQL. panel_dash is a
# root-run binary that parses /proc, /sys, emhttp ini files, the docker socket and
# raw I2C frames, so it is the meaningful attack surface in this plugin.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '27 4 * * 1'   # weekly, Monday 04:27 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze C/C++
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libdrm-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-extended
          config: |
            paths-ignore:
              - src/panel/stb_image.h
              - src/panel/stb_image_write.h
              - src/panel/stb_easy_font.h

      - name: Build panel_dash
        run: bash src/panel/build.sh

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:c-cpp"
