name: release

# Cut a release straight from the repo. Maintainer flow:
#   1. Bump <!ENTITY version> and add a ###<version> block to CHANGES in the .plg.
#   2. Commit + push to main.
#   3. Actions -> "release" -> Run workflow.
# The job builds the payload, writes its SHA256 back into the .plg (so the plugin
# URL always serves a hash matching the published asset), commits that, and
# publishes the GitHub release with the .txz. It no-ops if that version's release
# already exists, so published versions are never clobbered.

on:
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Read plugin version
        id: meta
        run: |
          VER=$(grep -oP '<!ENTITY\s+version\s+"\K[^"]+' ugreen-idx6011-pro.plg)
          [ -n "$VER" ] || { echo "::error::could not read <!ENTITY version> from .plg"; exit 1; }
          case "$VER" in *[!0-9A-Za-z.]*) echo "::error::unexpected version '$VER'"; exit 1;; esac
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Plugin version: $VER"

      - name: Skip if release already exists
        id: exists
        env:
          GH_TOKEN: ${{ github.token }}
          VER: ${{ steps.meta.outputs.version }}
        run: |
          if gh release view "$VER" >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "::notice::release $VER already exists - nothing to do"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build panel_dash from source
        if: steps.exists.outputs.already == 'false'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libdrm-dev
          bash src/panel/build.sh
          ls -la src/panel/panel_dash
          file src/panel/panel_dash || true

      - name: Build payload
        if: steps.exists.outputs.already == 'false'
        env:
          VER: ${{ steps.meta.outputs.version }}
        run: bash release/mkpayload.sh "$VER"

      - name: Sync SHA256 into the .plg
        id: sha
        if: steps.exists.outputs.already == 'false'
        env:
          VER: ${{ steps.meta.outputs.version }}
        run: |
          SHA=$(sha256sum "release/ugreen-idx6011-pro-$VER.txz" | awk '{print $1}')
          echo "payload SHA256: $SHA"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          sed -i -E "s#<SHA256>[0-9a-fA-F]*</SHA256>#<SHA256>${SHA}</SHA256>#" ugreen-idx6011-pro.plg

      - name: Sync .plg hash to main via pull request
        if: steps.exists.outputs.already == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VER: ${{ steps.meta.outputs.version }}
        run: |
          # main is protected (require-pull-request), so the bot cannot push
          # directly - it opens a PR for the payload SHA and merges it. 0 required
          # approvals, no required checks on this bot PR, so it is immediately
          # mergeable.
          if git diff --quiet -- ugreen-idx6011-pro.plg; then
            echo ".plg SHA256 already current - no PR needed"
            exit 0
          fi
          BRANCH="ci/plg-sha-${VER}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add ugreen-idx6011-pro.plg
          git commit -m "ci: sync .plg SHA256 for ${VER}"
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "ci: sync .plg SHA256 for ${VER}" \
            --body "Automated: payload SHA256 for the \`${VER}\` release. Merged by the release workflow so \`main\` is only updated through pull requests."
          merged=0
          for i in 1 2 3 4 5; do
            if gh pr merge "$BRANCH" --merge --delete-branch; then merged=1; break; fi
            echo "merge attempt $i not ready; retrying in 8s"; sleep 8
          done
          [ "$merged" = 1 ] || { echo "::error::could not merge $BRANCH"; exit 1; }
          git switch main && git pull --ff-only

      - name: Build release notes
        if: steps.exists.outputs.already == 'false'
        env:
          VER: ${{ steps.meta.outputs.version }}
          SHA: ${{ steps.sha.outputs.sha256 }}
        run: |
          # changelog block for this version, from the .plg CHANGES
          awk -v v="###${VER}" '
            $0==v {grab=1; next}
            /^###/ {if (grab) exit}
            grab {print}
          ' ugreen-idx6011-pro.plg > changelog.txt
          [ -s changelog.txt ] || echo "- maintenance release" > changelog.txt
          PLG="https://raw.githubusercontent.com/noodlemctwoodle/unraid-ugreen-idx6011-pro/main/ugreen-idx6011-pro.plg"
          {
            echo 'Touch **LCD dashboard** + smart **front-panel LEDs** for the **UGREEN NASync iDX6011 Pro** running **Unraid** - the full front panel, working natively, no UGOS required.'
            echo ''
            echo '## Install / update'
            echo ''
            echo 'In the Unraid web UI: **Plugins -> Install Plugin**, paste this URL and install:'
            echo ''
            echo '```'
            echo "$PLG"
            echo '```'
            echo ''
            echo 'Then **reboot**. The plugin downloads a SHA256-verified payload, stages everything, and registers its own EFI boot entry; the 258x960 touch panel lights once the box boots that entry.'
            echo ''
            echo 'If the panel stays dark after rebooting, make the entry first in the BIOS: **Boot > UEFI USB Hard Disk Drive BBS Priorities > `Unraid (iDX6011 panel)`**.'
            echo ''
            echo '> **Kernel-matched:** the bundled touch modules + display overlay are built for **kernel 6.18.38-Unraid (Unraid 7.3.2)**. On a different Unraid kernel the panel stays dark until you rebuild them with `boot/build-overlay.sh` (see the runbook).'
            echo ''
            echo "## What's changed in ${VER}"
            echo ''
            cat changelog.txt
            echo ''
            echo '---'
            echo "**Payload:** \`ugreen-idx6011-pro-${VER}.txz\`  |  **SHA256:** \`${SHA}\`"
            echo ''
            echo 'Docs & source: https://github.com/noodlemctwoodle/unraid-ugreen-idx6011-pro#readme'
          } > notes.md
          echo "---- notes ----"; cat notes.md

      - name: Publish release
        if: steps.exists.outputs.already == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VER: ${{ steps.meta.outputs.version }}
        run: |
          gh release create "$VER" "release/ugreen-idx6011-pro-$VER.txz" \
            --target main --title "$VER" --notes-file notes.md
