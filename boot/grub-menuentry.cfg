# EXACT content deployed to the UGOS ESP: nvme0n1p1:/EFI/debian/grub.cfg
# (backup of the vendor original sits alongside as grub.cfg.pre-unraid)
#
# Why this exists: the UGREEN BIOS powers the front-panel rail ONLY when booting
# this NVMe boot entry (Boot0001 "debian"). Unraid must therefore be chain-loaded
# through it. The USB flash (label UNRAID) stays plugged in; grub finds the kernel
# on it by file search, and Unraid finds its /boot + license the usual way.
#
# BootOrder must put the NVMe entry first:   efibootmgr -o 0001,0002,0003,0004,0005
#
# default="1" = the UNRAID entry below (0-indexed; UGOS remains entry 0).
# If the USB is missing, the search fails and only UGOS boots — safe fallback.

set default="1"
set timeout="3"

menuentry "UGOSPRO-NAS" {
	linux /boot/vmlinuz2 root=PARTUUID=bf054169-c92b-f24e-9eae-c336b9186abb rootwait console=tty0 overlay=/dev/mmcblk0p7 overlayfs=ext4 net.ifnames=0 quiet splash biosdevname=0
	initrd	/boot/initrd2.img
}
menuentry "UNRAID (kernel from USB flash)" {
	insmod part_msdos
	insmod fat
	search --no-floppy --file --set=root /bzimage
	linux /bzimage drm.debug=0x106 log_buf_len=64M
	initrd /bzroot /bzroot-wakefix
}
